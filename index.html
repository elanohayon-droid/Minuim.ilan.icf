<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>מילואים - הזימונים שלי</title>
  <style>
    @font-face {
      font-family: 'Heebo';
      src: url('fonts/Heebo-400.ttf') format('truetype');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'Heebo';
      src: url('fonts/Heebo-600.ttf') format('truetype');
      font-weight: 600; font-style: normal;
    }
    @font-face {
      font-family: 'Heebo';
      src: url('fonts/Heebo-700.ttf') format('truetype');
      font-weight: 700; font-style: normal;
    }
    @font-face {
      font-family: 'Heebo';
      src: url('fonts/Heebo-800.ttf') format('truetype');
      font-weight: 800; font-style: normal;
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --green:   #7EDC81;
      --red:     #d43535;
      --yellow:  #f4c430;
      --white:   #ffffff;
      --gold:    #c6a000;
      --border:  #e2e2e2;
      --dark:    #1a1a1a;
      --mid:     #3d3d3d;
      --light:   #777;
      --font:    'Heebo', Arial, sans-serif;
    }

    html, body {
      height: 100%;
      background: #f0f0f0;
      font-family: var(--font);
      color: var(--dark);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 530px;
      margin: 0 auto;
      background: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ═══ NAV ═══ */
    .nav {
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      height: 78px;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 30;
      flex-shrink: 0;
    }

    .nav__right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav__profile {
      width: 36px; height: 36px;
      border: 2px solid #c0c0c0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .nav__profile svg { width: 20px; height: 20px; fill: #999; }

    .nav__bell-wrap {
      position: relative;
      width: 44px; height: 44px;
      background: #fff9d0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .nav__bell-wrap svg { width: 22px; height: 22px; fill: #c89e00; }
    .nav__bell-badge {
      position: absolute; top: 3px; right: 3px;
      background: #e53030;
      color: #fff;
      font-size: 10px; font-weight: 800;
      width: 16px; height: 16px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 1.5px solid #fff;
    }

    .nav__tooltip {
      position: absolute;
      top: 78px; right: 315px;
      background: #fffacc;
      border: 1.5px solid #dfc624;
      border-radius: 10px;
      padding: 9px 16px;
      font-size: 14px; font-weight: 600;
      color: var(--dark);
      white-space: nowrap;
      z-index: 40;
      box-shadow: 0 3px 10px rgba(0,0,0,0.10);
      pointer-events: none;
    }
    .nav__tooltip::before {
      content: '';
      position: absolute; top: -9px; right: 14px;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 9px solid #dfc624;
    }
    .nav__tooltip::after {
      content: '';
      position: absolute; top: -7px; right: 15px;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 8px solid #fffacc;
    }

    .nav__divider {
      width: 1px; height: 36px;
      background: var(--border);
      flex-shrink: 0;
    }

    .nav__center {
      display: flex; align-items: center; gap: 10px;
    }
    .nav__greeting {
      font-size: 16px; font-weight: 600;
      color: var(--dark); white-space: nowrap;
    }

    /* IDF logo — circle emblem */
    .idf-logo {
      width: 40px; height: 40px; flex-shrink: 0;
    }

    .nav__hamburger {
      display: flex; flex-direction: column; gap: 5px;
      cursor: pointer; padding: 5px;
    }
    .nav__hamburger span {
      display: block; width: 24px; height: 2.5px;
      background: #2a2a2a; border-radius: 2px;
    }

    /* ═══ HERO ═══ */
    .hero {
      background: var(--green);
      padding: 14px 18px 84px;
      flex-shrink: 0;
    }

    .hero__title {
      font-size: 36px; font-weight: 800;
      color: var(--white);
      text-align: right;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .hero__dots {
      display: flex; gap: 6px;
      justify-content: flex-start; /* RTL: visual right */
      margin-bottom: 16px;
    }
    .hero__dots span {
      display: block; width: 26px; height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.35);
    }
    .hero__dots span.active { background: var(--white); }

    /* ═══ CARD ═══ */
    .card {
      background: var(--white);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 3px 18px rgba(0,0,0,0.14);
    }

    .card__top {
      padding: 16px 16px 0;
      display: flex; align-items: center;
      justify-content: space-between;
      /* RTL: first child → visual right */
    }

    /* first → visual RIGHT */
    .card__prev-btn {
      background: var(--red);
      color: var(--white);
      font-size: 17px; font-weight: 700;
      padding: 11px 24px;
      border-radius: 12px; border: none;
      cursor: pointer; font-family: var(--font);
      flex-shrink: 0;
    }

    /* second → visual LEFT */
    .card__status {
      display: flex; align-items: center; gap: 8px;
    }
    .card__kebab {
      display: flex; flex-direction: column; gap: 4px;
      padding: 2px 4px; cursor: pointer;
    }
    .card__kebab span {
      display: block; width: 4.5px; height: 4.5px;
      border-radius: 50%; background: var(--green);
    }
    .card__status-label {
      font-size: 16px; font-weight: 700; color: var(--green);
    }
    .card__check {
      width: 22px; height: 22px;
      border-radius: 50%; border: 2px solid var(--green);
      display: flex; align-items: center; justify-content: center;
    }
    .card__check svg {
      width: 12px; height: 12px;
      stroke: var(--green); fill: none;
      stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }

    .card__body { padding: 20px 20px 178px; }

    .card__title {
      font-size: 24px; font-weight: 800;
      color: var(--dark); text-align: right;
      line-height: 1.45; margin-bottom: 18px;
    }
    .card__title .sep {
      color: var(--green); font-weight: 300; margin: 0 6px;
    }

    .card__meta {
      display: flex; align-items: center;
      gap: 10px; margin-bottom: 12px;
      justify-content: flex-start; /* RTL: visual right */
    }
    .card__meta-text {
      font-size: 16px; color: var(--mid);
    }
    .card__meta-icon {
      width: 20px; height: 20px; flex-shrink: 0;
    }

    .card__actions {
      display: grid; grid-template-columns: 1fr 1fr;
      border-top: 1px solid #f0f0f0;
    }
    .card__action {
      padding: 13px 8px;
      text-align: center;
      font-size: 17px; font-weight: 600;
      cursor: pointer; border: none;
      font-family: var(--font); color: var(--dark);
    }
    .card__action--yellow { background: var(--yellow); }
    .card__action--white  {
      background: var(--white);
      border-inline-end: 1px solid #f0f0f0;
    }

    /* ═══ SECTION ═══ */
    .section {
      background: var(--white);
      padding: 24px 18px 0; flex: 1;
    }

    .section__header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 18px;
    }

    /* first → visual RIGHT */
    .section__title-block {
      display: flex; flex-direction: column;
      align-items: flex-end;
    }
    .section__title {
      font-size: 24px; font-weight: 800; color: var(--dark);
    }
    .section__underline {
      width: 46px; height: 4px;
      background: var(--yellow);
      border-radius: 2px; margin-top: 5px;
    }

    /* second → visual LEFT */
    .section__new-btn {
      background: var(--green); color: var(--white);
      border: none; border-radius: 28px;
      padding: 12px 22px;
      font-size: 16px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      font-family: var(--font); flex-shrink: 0;
    }
    .section__new-btn .plus { font-size: 20px; font-weight: 400; line-height: 1; }

    .item {
      border-top: 1px solid #f0f0f0;
      padding: 14px 0 16px;
    }
    .item__meta {
      font-size: 13px; color: var(--light);
      margin-bottom: 5px;
    }
    .item__meta strong { color: var(--mid); font-weight: 600; }
    .item__title {
      font-size: 18px; font-weight: 800;
      color: var(--dark); text-align: right;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- NAV -->
  <nav class="nav">
    <div class="nav__right">
      <div class="nav__profile">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.6 0 4.7-2.1 4.7-4.7S14.6 2.6 12 2.6 7.3 4.7 7.3 7.3 9.4 12 12 12zm0 2.4c-3.2 0-9.4 1.6-9.4 4.7v2.3h18.8v-2.3c0-3.1-6.2-4.7-9.4-4.7z"/></svg>
      </div>
      <div class="nav__bell-wrap">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <div class="nav__bell-badge">1</div>
      </div>
    </div>

    <div class="nav__tooltip">יש לך הודעות חדשות</div>

    <div class="nav__divider"></div>

    <div class="nav__center">
      <!-- IDF logo FIRST → visual right in RTL (next to divider) -->
      <svg class="idf-logo" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <g fill="#C6A000">
          <polygon points="38,8 42,8 43,58 37,58"/>
          <polygon points="37,8 40,2 43,8"/>
          <rect x="28" y="20" width="24" height="4" rx="2"/>
          <ellipse cx="40" cy="62" rx="5" ry="4"/>
          <ellipse cx="29" cy="34" rx="6" ry="3" transform="rotate(-50 29 34)"/>
          <ellipse cx="24" cy="44" rx="6" ry="3" transform="rotate(-40 24 44)"/>
          <ellipse cx="22" cy="54" rx="5.5" ry="2.8" transform="rotate(-25 22 54)"/>
          <path d="M37,30 Q30,33 26,40" fill="none" stroke="#C6A000" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M37,40 Q29,42 24,50" fill="none" stroke="#C6A000" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M37,50 Q29,52 23,58" fill="none" stroke="#C6A000" stroke-width="1.5" stroke-linecap="round"/>
          <ellipse cx="51" cy="34" rx="6" ry="3" transform="rotate(50 51 34)"/>
          <ellipse cx="56" cy="44" rx="6" ry="3" transform="rotate(40 56 44)"/>
          <ellipse cx="58" cy="54" rx="5.5" ry="2.8" transform="rotate(25 58 54)"/>
          <path d="M43,30 Q50,33 54,40" fill="none" stroke="#C6A000" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M43,40 Q51,42 56,50" fill="none" stroke="#C6A000" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M43,50 Q51,52 57,58" fill="none" stroke="#C6A000" stroke-width="1.5" stroke-linecap="round"/>
        </g>
      </svg>
      <!-- greeting SECOND → visual left in RTL -->
      <span class="nav__greeting">בוקר טוב ידידיה</span>
    </div>

    <div class="nav__hamburger">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h1 class="hero__title">הזימונים שלי</h1>
    <div class="hero__dots">
      <span class="active"></span><span></span>
    </div>

    <div class="card">
      <div class="card__top">
        <!-- first → visual RIGHT in RTL -->
        <button class="card__prev-btn">זימון קודם</button>
        <!-- second → visual LEFT in RTL -->
        <div class="card__status">
          <div class="card__kebab"><span></span><span></span><span></span></div>
          <span class="card__status-label">מתקיים כעת</span>
          <div class="card__check">
            <svg viewBox="0 0 12 10"><polyline points="1,5 4.5,8.5 11,1.5"/></svg>
          </div>
        </div>
      </div>

      <div class="card__body">
        <div class="card__title">
          תעסוקה מבצעית בצו 8<span class="sep">|</span>116 ימים
        </div>
        <div class="card__meta">
          <span class="card__meta-text">29.06.25 - 22.10.25</span>
          <svg class="card__meta-icon" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8"  y1="2" x2="8"  y2="6"/>
            <line x1="3"  y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div class="card__meta">
          <span class="card__meta-text">רחובות - מחנה ליפקין</span>
          <svg class="card__meta-icon" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </div>
      </div>

      <div class="card__actions">
        <!-- RTL grid: first → visual right (white), second → visual left (yellow) -->
        <button class="card__action card__action--white">בקשות מיוחדות</button>
        <button class="card__action card__action--yellow">החזרי נסיעות</button>
      </div>
    </div>
  </section>

  <!-- SECTION -->
  <section class="section">
    <div class="section__header">
      <!-- first → visual RIGHT in RTL -->
      <div class="section__title-block">
        <span class="section__title">פניות ובקשות</span>
        <div class="section__underline"></div>
      </div>
      <!-- second → visual LEFT in RTL -->
      <button class="section__new-btn">
        <span class="plus">+</span>
        <span>בקשה חדשה</span>
      </button>
    </div>

    <div class="item">
      <div class="item__meta">עדכון אחרון: <strong>02.04.25</strong></div>
      <div class="item__title">שפ"א - פרטי חשרוו רוה</div>
    </div>
  </section>

</div>
</body>
</html>
